name: DropShip Studio
options:
  bundleIdPrefix: com.mattypattysapps
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_NAME: DropShip Studio
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    CODE_SIGN_IDENTITY: "Apple Distribution"
    DEVELOPMENT_TEAM: ""
packages: {}
targets:
  DropShipStudio:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DropShipStudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mattypattysapps.dropshipstudio
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: DropShip Studio
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Import product clips for editing.
        INFOPLIST_KEY_NSCameraUsageDescription: Capture new product videos.
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: Analyze local demand.
        INFOPLIST_KEY_NSUserNotificationsUsageDescription: Send campaign alerts.
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets: []