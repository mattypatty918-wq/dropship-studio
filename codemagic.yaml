# Codemagic CI/CD for dropship-studio
workflows:
  ios-workflow:
    name: iOS
    max_build_duration: 60
    environment:
      vars:
        XCODE_VERSION: "16.0"
        APP_NAME: "dropship-studio"
    triggering:
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - git clone https://github.com/mattypatty918-wq/dropship-studio.git --depth 1
      - cd dropship-studio && git submodule update --init --recursive
      - cd dropship-studio && xcode-project fetch-dependencies --use-cache
      - cd dropship-studio && xcode-project build --workspace DropShipStudio.xcodeproj --scheme DropShipStudio --configuration Release
    artifacts:
      - dropship-studio/ios/*.ipa
    publishing:
      app_store_connect:
        api_key: Whitefoxes
