name: DropShip Studio
description: AI-powered dropshipping video creation studio
type: ios
environment:
  ios: "17.0"
workflows:
  ios-workflow:
    name: iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      vars:
        BUNDLE_ID: com.mattypattysapps.dropshipstudio
        XCODE_WORKSPACE: DropShipStudio/DropShipStudio.xcworkspace
        XCODE_SCHEME: DropShipStudio
    scripts:
      - xcode-project build-ipa --workspace $XCODE_WORKSPACE --scheme $XCODE_SCHEME
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration