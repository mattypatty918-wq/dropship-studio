name: DropShip Studio
description: AI-powered dropshipping video creation studio
type: ios
environment:
  ios: "17.0"
workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 120
    environment:
      ios:
        version: "17.0"
      xcode: "16.0"
    scripts:
      - |
        # Install dependencies
        cd DropShipStudio
        ls -la
      - |
        # Build the project
        xcodebuild build \
          -workspace DropShipStudio.xcodeproj \
          -scheme DropShipStudio \
          -configuration Release \
          -destination 'platform=iOS Simulator,name=iPhone 16' \
          CODE_SIGN_IDENTITY="Apple Distribution" \
          DEVELOPMENT_TEAM="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO 2>&1 | tail -30
    artifacts:
      - build/ios/ipa/*.ipa
      - "*.ipa"
    publishing:
      email:
        recipients:
          - mattypatty918@gmail.com